data:
  # Relative paths are resolved from the repository root.
  rf_csv: "rf_trajectory_log.csv"
  tx_anchor_json: "tx_anchor.json"
  room_mesh_obj: "quest_room_mesh.obj"
  dataset_metadata_json: "rf_dataset_metadata.json"
  target_bssid: null

quest_sync:
  enabled: true
  adb_path: "C:/Program Files/Unity/Hub/Editor/6000.4.10f1/Editor/Data/PlaybackEngines/AndroidPlayer/SDK/platform-tools/adb.exe"
  package_name: "com.DefaultCompany.RadioTwin_Quest_DataCollector"

split:
  mode: "segment"
  segment_start_fraction: 0.6
  test_fraction: 0.2

gp:
  matern_nu: 1.5
  n_restarts_optimizer: 5
  random_state: 42

simple_rt:
  enabled: true
  d0_m: 1.0
  min_distance_m: 0.1
  ray_epsilon_m: 0.01
  path_loss_exponent:
    min: 0.5
    max: 6.0
    grid_points: 200

radiomap:
  eval_height_mode: "median_measurement"
  # Set a number to explicitly override the automatic median measurement height.
  eval_height_m: null
  grid_resolution_m: 0.10
  bounds_padding_m: 0.20
  vmin_dbm: -90
  vmax_dbm: -30
  save_debug_autoscaled: true
  output_dir: "benchmark/outputs"
